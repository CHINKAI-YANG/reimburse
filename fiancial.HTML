<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帳本 · Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4ede0;
    --paper-2:#ece2d0;
    --ink:#2b2420;
    --ink-soft:#6b5d4f;
    --line:#d8ccb6;
    --accent:#c0392b;     /* 朱紅 */
    --green:#3f6b4d;      /* 收入墨綠 */
    --gold:#a9853f;
    --shadow:rgba(43,36,32,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Noto Sans TC",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% 10%, #faf4e9, transparent 60%),
      radial-gradient(circle at 90% 80%, #efe5d2, transparent 55%),
      var(--paper);
    background-attachment:fixed;
    min-height:100vh;
    padding:32px 16px 80px;
    -webkit-font-smoothing:antialiased;
  }
  /* 紙張纖維紋理 */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;opacity:.04;z-index:0;
    background-image:repeating-linear-gradient(0deg,#000 0 1px,transparent 1px 3px);
  }
  .wrap{max-width:760px;margin:0 auto;position:relative;z-index:1}

  /* 報頭 */
  header.masthead{
    text-align:center;border-bottom:3px double var(--ink);
    padding-bottom:18px;margin-bottom:8px;
  }
  .masthead .kicker{
    font-family:"Fraunces",serif;font-style:italic;letter-spacing:.18em;
    text-transform:uppercase;font-size:12px;color:var(--ink-soft);
  }
  .masthead h1{
    font-family:"Noto Serif TC","Fraunces",serif;font-weight:900;
    font-size:clamp(40px,9vw,72px);line-height:.95;letter-spacing:.04em;margin:6px 0;
  }
  .masthead .date{
    font-family:"Fraunces",serif;font-size:13px;color:var(--ink-soft);letter-spacing:.1em;
  }

  /* 結餘卡 */
  .summary{
    display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:1px;
    background:var(--line);border:1.5px solid var(--ink);
    margin:26px 0;box-shadow:6px 6px 0 var(--shadow);
  }
  .summary .cell{background:var(--paper);padding:18px 16px}
  .summary .cell:first-child{background:var(--ink);color:var(--paper)}
  .cell .lab{font-size:12px;letter-spacing:.14em;text-transform:uppercase;opacity:.7;margin-bottom:6px;font-family:"Fraunces",serif;font-style:italic}
  .cell .num{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(20px,5vw,30px);line-height:1}
  .cell .num.sm{font-size:clamp(17px,4vw,23px)}
  .cell.exp .num{color:var(--accent)}
  .cell.inc .num{color:var(--green)}
  .num::before{content:"$";font-size:.6em;vertical-align:.12em;margin-right:2px;opacity:.6}
  .num.nodollar::before{content:none}

  /* 新增表單 */
  .panel{
    background:var(--paper-2);border:1.5px solid var(--ink);
    padding:22px;margin-bottom:30px;box-shadow:6px 6px 0 var(--shadow);
  }
  .panel h2{
    font-family:"Noto Serif TC",serif;font-weight:600;font-size:19px;
    margin-bottom:16px;display:flex;align-items:center;gap:10px;
  }
  .panel h2::before{content:"✦";color:var(--accent);font-size:14px}

  .seg{display:flex;gap:0;margin-bottom:16px;border:1.5px solid var(--ink)}
  .seg button{
    flex:1;padding:11px;border:none;background:transparent;cursor:pointer;
    font-family:"Noto Sans TC";font-weight:700;font-size:15px;color:var(--ink-soft);
    transition:.18s;letter-spacing:.05em;
  }
  .seg button+button{border-left:1.5px solid var(--ink)}
  .seg button.on[data-k="expense"]{background:var(--accent);color:#fff}
  .seg button.on[data-k="income"]{background:var(--green);color:#fff}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:5px;font-weight:500;text-transform:uppercase;font-family:"Fraunces",serif;font-style:italic}
  .field input,.field select,.field textarea{
    width:100%;padding:11px 12px;border:1.5px solid var(--line);background:var(--paper);
    font-family:"Noto Sans TC";font-size:15px;color:var(--ink);border-radius:0;
    transition:.18s;
  }
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:none;border-color:var(--ink);box-shadow:3px 3px 0 var(--shadow);
  }
  .field textarea{resize:vertical;min-height:46px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .amount-in{font-family:"Fraunces",serif;font-weight:600;font-size:22px}

  /* 圖片上傳 */
  .drop{
    border:1.5px dashed var(--ink-soft);background:var(--paper);
    padding:16px;text-align:center;cursor:pointer;transition:.18s;color:var(--ink-soft);
    font-size:14px;display:flex;align-items:center;justify-content:center;gap:10px;min-height:54px;
  }
  .drop:hover{border-color:var(--ink);background:#fbf6ec}
  .drop svg{width:20px;height:20px;flex:none}
  .preview-thumb{max-height:120px;border:1.5px solid var(--ink);box-shadow:3px 3px 0 var(--shadow)}
  .preview-wrap{position:relative;display:inline-block;margin-top:4px}
  .preview-wrap .x{
    position:absolute;top:-9px;right:-9px;width:24px;height:24px;border-radius:50%;
    background:var(--accent);color:#fff;border:1.5px solid var(--ink);cursor:pointer;
    font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;
  }

  .add-btn{
    width:100%;margin-top:6px;padding:14px;background:var(--ink);color:var(--paper);
    border:1.5px solid var(--ink);font-family:"Noto Serif TC";font-weight:600;font-size:16px;
    cursor:pointer;letter-spacing:.12em;transition:.18s;box-shadow:4px 4px 0 var(--shadow);
  }
  .add-btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--shadow)}
  .add-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow)}

  /* 帳目列表 */
  .ledger-head{
    display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:4px;
  }
  .ledger-head h2{font-family:"Noto Serif TC",serif;font-weight:600;font-size:20px}
  .ledger-head .count{font-family:"Fraunces",serif;font-style:italic;color:var(--ink-soft);font-size:13px}

  .entry{
    display:flex;align-items:center;gap:14px;padding:14px 4px;
    border-bottom:1px solid var(--line);animation:rise .35s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .entry .tag{
    width:8px;align-self:stretch;flex:none;border-radius:1px;
  }
  .entry.expense .tag{background:var(--accent)}
  .entry.income .tag{background:var(--green)}
  .entry .img{
    width:48px;height:48px;flex:none;object-fit:cover;border:1.5px solid var(--ink);
    cursor:pointer;background:var(--paper-2);
  }
  .entry .img.placeholder{display:flex;align-items:center;justify-content:center;color:var(--line);font-size:20px}
  .entry .meta{flex:1;min-width:0}
  .entry .meta .cat{font-weight:700;font-size:15px}
  .entry .meta .sub{font-size:12px;color:var(--ink-soft);margin-top:2px;font-family:"Fraunces",serif;font-style:italic}
  .entry .meta .note{font-size:12.5px;color:var(--ink-soft);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .entry .amt{font-family:"Fraunces",serif;font-weight:600;font-size:19px;white-space:nowrap}
  .entry.expense .amt{color:var(--accent)}
  .entry.income .amt{color:var(--green)}
  .entry .amt::before{content:"$";font-size:.62em;opacity:.6;margin-right:1px}
  .entry .del{
    background:none;border:none;cursor:pointer;color:var(--line);font-size:18px;padding:4px 6px;transition:.18s;flex:none;
  }
  .entry .del:hover{color:var(--accent)}

  .empty{text-align:center;padding:50px 20px;color:var(--ink-soft)}
  .empty .big{font-family:"Noto Serif TC",serif;font-size:46px;opacity:.35;margin-bottom:8px}
  .empty p{font-family:"Fraunces",serif;font-style:italic;font-size:15px}

  /* 圖片放大 */
  .lightbox{
    position:fixed;inset:0;background:rgba(20,16,12,.86);display:none;
    align-items:center;justify-content:center;z-index:50;padding:30px;cursor:zoom-out;
    backdrop-filter:blur(3px);
  }
  .lightbox.show{display:flex;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .lightbox img{max-width:100%;max-height:100%;border:4px solid var(--paper);box-shadow:0 12px 40px rgba(0,0,0,.5)}

  footer{text-align:center;margin-top:40px;font-family:"Fraunces",serif;font-style:italic;color:var(--ink-soft);font-size:12px;letter-spacing:.1em}

  @media(max-width:560px){
    .summary{grid-template-columns:1fr;}
    .summary .cell:first-child{grid-column:1}
    .row{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div class="kicker">Personal Finance · 私人帳簿</div>
    <h1>帳 本</h1>
    <div class="date" id="todayLabel"></div>
  </header>

  <section class="summary">
    <div class="cell">
      <div class="lab">This Month 本月支出</div>
      <div class="num" id="monthExp">0</div>
    </div>
    <div class="cell exp">
      <div class="lab">Total 總支出</div>
      <div class="num sm" id="totalExp">0</div>
    </div>
    <div class="cell">
      <div class="lab">Records 筆數</div>
      <div class="num sm nodollar" id="recCount">0</div>
    </div>
  </section>

  <section class="panel">
    <h2>記一筆</h2>

    <div class="field">
      <label>金額</label>
      <input type="number" id="amount" class="amount-in" placeholder="0" min="0" step="1" inputmode="decimal">
    </div>

    <div class="row">
      <div class="field">
        <label>分類</label>
        <select id="category"></select>
      </div>
      <div class="field">
        <label>日期</label>
        <input type="date" id="date">
      </div>
    </div>

    <div class="field">
      <label>備註</label>
      <textarea id="note" placeholder="午餐、車費、薪水…"></textarea>
    </div>

    <div class="field">
      <label>收據 / 照片</label>
      <div class="drop" id="drop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 16v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3"/><path d="M12 3v13M7 8l5-5 5 5"/></svg>
        <span id="dropText">點此上傳圖片(可選)</span>
      </div>
      <input type="file" id="file" accept="image/*" hidden>
      <div id="previewBox"></div>
    </div>

    <button class="add-btn" id="addBtn">記 入 帳 本</button>
  </section>

  <section>
    <div class="ledger-head">
      <h2>明細</h2>
      <span class="count" id="count">— 筆紀錄</span>
    </div>
    <div id="list"></div>
  </section>

  <footer>— 資料自動保存於本機與雲端 · Keep good records —</footer>
</div>

<div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>

<script>
const CATS = ["飲食","交通","購物","居住","娛樂","醫療","教育","其他"];
let pendingImg = null;       // 待儲存的壓縮圖片(base64)
let entries = [];
const KEY = "ledger:entries";

// 🚀 這裡已經幫你填入正確的網址
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxddL8UWgCRuVsqO20d4UXhWuyDHCmZJdA3fH5wvoYw65kVxHiP_VsbedqbvDBgkwGm/exec";

const $ = id => document.getElementById(id);

/* 初始化 */
function todayStr(){ return new Date().toISOString().slice(0,10); }
$("date").value = todayStr();
$("todayLabel").textContent = new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
fillCats();

function fillCats(){
  $("category").innerHTML = CATS.map(c=>`<option>${c}</option>`).join("");
}

/* 圖片上傳 + 壓縮 */
$("drop").onclick = ()=> $("file").click();
$("file").onchange = e=>{
  const f = e.target.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{
      // 壓縮:最長邊限制 900px, JPEG 0.7
      const max = 900;
      let {width:w, height:h} = img;
      if(w>h && w>max){ h=h*max/w; w=max; }
      else if(h>=w && h>max){ w=w*max/h; h=max; }
      const cv = document.createElement("canvas");
      cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      pendingImg = cv.toDataURL("image/jpeg",0.7);
      showPreview();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
};

function showPreview(){
  const box = $("previewBox");
  if(!pendingImg){ box.innerHTML=""; $("dropText").textContent="點此上傳圖片(可選)"; return; }
  $("dropText").textContent="重新選擇圖片";
  box.innerHTML = `<div class="preview-wrap">
      <img src="${pendingImg}" class="preview-thumb" alt="預覽">
      <div class="x" id="rmImg">×</div></div>`;
  $("rmImg").onclick = ()=>{ pendingImg=null; $("file").value=""; showPreview(); };
}

/* 新增帳目 */
$("addBtn").onclick = async ()=>{
  const amount = parseFloat($("amount").value);
  if(!amount || amount<=0){ flashField($("amount")); return; }
  
  const entry = {
    id: Date.now()+"-"+Math.random().toString(36).slice(2,6),
    amount: amount,
    category: $("category").value,
    date: $("date").value || todayStr(),
    note: $("note").value.trim(),
    img: pendingImg
  };

  // 鎖定按鈕防止重複點擊
  $("addBtn").disabled = true;
  $("addBtn").textContent = "正在同步至雲端...";

  // 1. 推送到 Google Sheet 雲端
  try {
    await sendToGoogleSheet(entry);
  } catch (err) {
    console.error("雲端同步失敗", err);
    alert("雲端同步失敗，但資料仍會保存在本機。");
  }

  // 2. 寫入本地儲存
  entries.unshift(entry);
  saveToLocal();
  
  // 重置表單
  $("amount").value=""; $("note").value=""; pendingImg=null; $("file").value=""; showPreview();
  $("addBtn").disabled = false;
  $("addBtn").textContent = "記 入 帳 本";
  render();
};

// 呼叫 API 將資料發送至 Google 試算表
async function sendToGoogleSheet(entry) {
  if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL === "") {
    console.warn("未設定 Google Script URL");
    return;
  }
  
  await fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(entry)
  });
}

function flashField(el){
  el.style.borderColor="var(--accent)";
  el.focus();
  setTimeout(()=> el.style.borderColor="", 700);
}

/* 刪除本機明細 */
function del(id){
  entries = entries.filter(e=>e.id!==id);
  saveToLocal();
  render();
}

/* 渲染 */
function render(){
  const nowMonth = todayStr().slice(0,7); // YYYY-MM
  let total=0, monthTotal=0;
  entries.forEach(e=>{
    total+=e.amount;
    if((e.date||"").slice(0,7)===nowMonth) monthTotal+=e.amount;
  });
  $("monthExp").textContent = fmt(monthTotal);
  $("totalExp").textContent = fmt(total);
  $("recCount").textContent = entries.length;
  $("count").textContent = entries.length+" 筆紀錄";

  const list = $("list");
  if(entries.length===0){
    list.innerHTML = `<div class="empty"><div class="big">⌘</div><p>還沒有任何紀錄，記下第一筆吧。</p></div>`;
    return;
  }
  list.innerHTML = entries.map(e=>{
    const imgHtml = e.img
      ? `<img src="${e.img}" class="img" data-full="${e.id}" alt="收據">`
      : `<div class="img placeholder">◷</div>`;
    const sub = fmtDate(e.date);
    return `<div class="entry expense">
        <div class="tag"></div>
        ${imgHtml}
        <div class="meta">
          <div class="cat">${e.category}</div>
          <div class="sub">${sub}</div>
          ${e.note?`<div class="note">${escapeHtml(e.note)}</div>`:""}
        </div>
        <div class="amt">${fmt(e.amount)}</div>
        <button class="del" data-del="${e.id}" title="刪除本機紀錄">✕</button>
      </div>`;
  }).join("");

  list.querySelectorAll("[data-del]").forEach(b=> b.onclick=()=>del(b.dataset.del));
  list.querySelectorAll("[data-full]").forEach(img=> img.onclick=()=>openLightbox(img.src));
}

function fmt(n){ return Math.round(n).toLocaleString("en-US"); }
function fmtDate(d){
  const p = d.split("-");
  return p.length===3 ? `${p[1]}/${p[2]}` : d;
}
function escapeHtml(s){ return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* 圖片放大 */
function openLightbox(src){
  $("lightboxImg").src = src;
  $("lightbox").classList.add("show");
}
$("lightbox").onclick = ()=> $("lightbox").classList.remove("show");

/* 修正後的儲存與載入機制 */
function saveToLocal(){
  try{
    localStorage.setItem(KEY, JSON.stringify(entries));
  }catch(err){
    console.error("儲存失敗",err);
    alert("本機容量已滿，部分圖片未能緩存，但資料已嘗試上傳至雲端試算表。");
  }
}

function loadFromLocal(){
  try{
    const localData = localStorage.getItem(KEY);
    entries = localData ? JSON.parse(localData) : [];
  }catch(err){
    entries = [];
  }
  render();
}

loadFromLocal();
</script>
</body>
</html>
