<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家族照顧開銷與對帳中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2 family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4ede0;--paper-2:#ece2d0;--ink:#2b2420;--ink-soft:#6b5d4f;--line:#d8ccb6;
    --accent:#c0392b;--green:#3f6b4d;--shadow:rgba(43,36,32,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Noto Sans TC",sans-serif;color:var(--ink);
    background: radial-gradient(circle at 20% 10%, #faf4e9, transparent 60%), radial-gradient(circle at 90% 80%, #efe5d2, transparent 55%), var(--paper);
    background-attachment:fixed;min-height:100vh;padding:20px 16px 80px;
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.04;z-index:0;background-image:repeating-linear-gradient(0deg,#000 0 1px,transparent 1px 3px);}
  .wrap{max-width:760px;margin:0 auto;position:relative;z-index:1;display:none;} 

  /* 登入遮罩 */
  .login-overlay{
    position:fixed;inset:0;background:var(--paper);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .login-box{
    background:var(--paper-2);border:2px solid var(--ink);padding:30px;
    width:100%;max-width:360px;box-shadow:6px 6px 0 var(--shadow);text-align:center;
  }
  .login-box h2{font-family:"Noto Serif TC",serif;margin-bottom:20px;font-size:22px}
  .login-box select, .login-box input{
    width:100%;padding:12px;margin-bottom:15px;border:1.5px solid var(--ink);
    background:var(--paper);font-size:15px;font-family:inherit;
  }
  .login-box button{
    width:100%;padding:12px;background:var(--ink);color:var(--paper);
    border:none;font-weight:bold;cursor:pointer;font-size:16px;
  }

  /* 主介面 */
  header.masthead{text-align:center;border-bottom:3px double var(--ink);padding-bottom:12px;margin-bottom:20px;}
  .masthead h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:32px;margin:4px 0;}
  .user-banner{display:flex;justify-content:space-between;background:var(--ink);color:var(--paper);padding:10px 14px;margin-bottom:20px;font-size:14px;font-weight:bold;}
  .user-banner button{background:none;border:none;color:var(--paper);cursor:pointer;text-decoration:underline;font-size:12px;}

  .tabs{display:flex;gap:10px;margin-bottom:20px;}
  .tab-btn{
    flex:1;padding:12px;background:var(--paper-2);border:1.5px solid var(--ink);
    font-family:"Noto Serif TC",serif;font-weight:600;font-size:15px;cursor:pointer;color:var(--ink-soft);
  }
  .tab-btn.active{background:var(--ink);color:var(--paper);}

  .system-page{display:none;}
  .system-page.active{display:block;}

  /* 統計區 */
  .summary{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1.5px solid var(--ink);margin-bottom:20px;}
  .summary .cell{background:var(--paper);padding:14px;}
  .cell .lab{font-size:11px;color:var(--ink-soft);font-family:"Fraunces",serif;font-style:italic}
  .cell .num{font-family:"Fraunces",serif;font-weight:600;font-size:24px;}
  .num::before{content:"$";font-size:.6em;margin-right:2px;opacity:.6}

  .panel{background:var(--paper-2);border:1.5px solid var(--ink);padding:20px;margin-bottom:20px;}
  .panel h2{font-family:"Noto Serif TC",serif;font-size:16px;margin-bottom:12px;}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px;}
  .field input, .field select{width:100%;padding:10px;border:1.5px solid var(--line);background:var(--paper);font-size:14px;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .add-btn{width:100%;padding:12px;background:var(--ink);color:var(--paper);border:1.5px solid var(--ink);font-weight:bold;cursor:pointer;}

  .list-head{font-family:"Noto Serif TC",serif;font-weight:600;font-size:16px;border-bottom:2px solid var(--ink);padding-bottom:6px;margin:20px 0 10px;}

  /* 卡片與明細外觀 */
  .entry{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px solid var(--line);}
  .entry .user-tag{font-size:11px;background:var(--ink);color:var(--paper);padding:2px 6px;font-weight:bold;flex:none}
  .entry .meta{flex:1;min-width:0}
  .entry .meta .cat{font-weight:700;font-size:14px;}
  .entry .meta .sub{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .entry .amt{font-family:"Fraunces",serif;font-weight:600;font-size:18px;color:var(--accent)}
  
  /* 專屬收據縮圖樣式 */
  .receipt-preview {
    display: block; max-width: 140px; max-height: 140px; 
    border: 1px solid var(--line); margin-top: 6px; cursor: pointer;
    box-shadow: 2px 2px 0 var(--shadow); transition: transform 0.2s;
  }
  .receipt-preview:hover { transform: scale(1.05); }
  .upload-status { font-size:12px; color:var(--green); margin-top:4px; display:none; font-weight:bold; }

  .entry.payable-card{border:1.5px solid var(--ink);background:var(--paper);margin-bottom:8px;padding:12px;box-shadow:3px 3px 0 var(--shadow);}
  .entry.payable-card.paid-true{opacity:0.6;background:var(--paper-2);border-color:var(--ink-soft);box-shadow:none;}
  .entry.payable-card.paid-true .amt{color:var(--green);text-decoration:line-through;}

  .btn-status{padding:6px 10px;border:1.5px solid var(--ink);background:var(--paper);font-size:12px;font-weight:600;cursor:pointer;box-shadow:2px 2px 0 var(--shadow);}
  .btn-status:hover{background:var(--ink);color:var(--paper);}
  .btn-del{background:none;border:none;cursor:pointer;color:var(--line);font-size:16px;margin-left:6px}
  .btn-del:hover{color:var(--accent)}

  .loading-mask{text-align:center;padding:20px;font-style:italic;color:var(--ink-soft);font-weight:bold}
  .empty{text-align:center;padding:30px;color:var(--ink-soft);font-size:14px;font-style:italic}
  footer{text-align:center;margin-top:40px;font-family:"Fraunces",serif;font-style:italic;color:var(--ink-soft);font-size:12px;}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>爺爺照顧帳簿 · 身分認證</h2>
    <select id="loginUser">
      <option value="爸爸">爸爸</option>
      <option value="大姑姑">大姑姑</option>
      <option value="小姑姑">小姑姑</option>
      <option value="媽媽">媽媽</option>
      <option value="我">我</option>
    </select>
    <input type="password" id="loginPass" placeholder="請輸入專屬密碼">
    <button onclick="checkLogin()">確認身分並登入</button>
  </div>
</div>

<div class="wrap" id="mainWrap">
  <header class="masthead">
    <h1>家族雲端對帳中心</h1>
  </header>

  <div class="user-banner">
    <span>👤 目前登入：<span id="currentUserLabel" style="color:#faf4e9; font-size:15px; border-bottom:1px dashed #fff;"></span></span>
    <button onclick="logout()">切換身分</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="t1" onclick="switchTab('ledgerPage', this)">🛒 爺爺日常開銷 (全員共享)</button>
    <button class="tab-btn" id="t2" onclick="switchTab('payablesPage', this)">🔒 專屬對帳單 (隱私保護)</button>
  </div>

  <div id="loading" class="loading-mask">🔄 正在安全過濾雲端資料...</div>

  <div id="ledgerPage" class="system-page active">
    <section class="panel">
      <h2>登記爺爺開銷 (填表人將自動綁定)</h2>
      <div class="field"><label>開銷金額</label><input type="number" id="amount" placeholder="0" inputmode="decimal"></div>
      <div class="row">
        <div class="field"><label>開銷分類</label><select id="category"><option>醫療看護</option><option>飲食營養</option><option>生活雜支</option><option>交通醫療</option><option>其他開銷</option></select></div>
        <div class="field"><label>日期</label><input type="date" id="date"></div>
      </div>
      <div class="field"><label>詳細備註說明</label><input type="text" id="note" placeholder="例如：買尿布兩箱、門診掛號費"></div>
      
      <div class="field">
        <label>附加收據照片 (可選)</label>
        <input type="file" id="photoFile" accept="image/*" style="display:none;" onchange="handlePhotoUpload(this)">
        <button type="button" class="add-btn" style="background:var(--paper); color:var(--ink); margin-bottom:4px;" onclick="$('photoFile').click()">📷 拍照或選擇收據圖片</button>
        <div id="uploadStatus" class="upload-status">✓ 照片已成功就緒</div>
      </div>

      <button class="add-btn" id="addLedgerBtn">寫入雲端帳本</button>
    </section>
    <div class="list-head">📋 爺爺日常消費明細 (所有人均可查看)</div>
    <div id="ledgerList"></div>
  </div>

  <div id="payablesPage" class="system-page">
    <section class="summary">
      <div class="cell"><div class="lab">與我有關的未結清金額</div><div class="num" id="sumUnpaid">0</div></div>
      <div class="cell" style="background-color:#efe5d2;"><div class="lab">與我有關的已結清金額</div><div class="num" id="sumPaid">0</div></div>
    </section>

    <section class="panel">
      <h2>登記對帳項目 (系統會自動填入你是「登記人」)</h2>
      <div class="row">
        <div class="field">
          <label>要支付給誰 (收款對象)</label>
          <select id="pWho">
            <option value="爸爸">爸爸</option><option value="大姑姑">大姑姑</option><option value="小姑姑">小姑姑</option><option value="媽媽">媽媽</option><option value="我">我</option>
          </select>
        </div>
        <div class="field"><label>金額</label><input type="number" id="pAmount" placeholder="0" inputmode="decimal"></div>
      </div>
      <div class="field"><label>款項用途備註</label><input type="text" id="pNote" placeholder="例如：大姑姑代墊醫藥費，私下還款用"></div>
      <button class="add-btn" id="addPayableBtn">登記此筆款項</button>
    </section>

    <div class="list-head">⏳ 與我有關的未清償明細 (僅相關雙方可見)</div>
    <div id="unpaidList"></div>
    <div class="list-head">✅ 與我有關的歷史清償紀錄 (雙方畫面顯示 OK)</div>
    <div id="paidList"></div>
  </div>

  <footer>— 隱私過濾安全保護中 —</footer>
</div>

<script>
// 🚀 請確保這裡換成了你部署成功的正式 GAS 網址！
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxddL8UWgCRuVsqO20d4UXhWuyDHCmZJdA3fH5wvoYw65kVxHiP_VsbedqbvDBgkwGm/exec";

const PASSWORDS = { "錦文":"888", "大姑姑":"111", "小姑姑":"222", "慧蘭":"333", "晉凱":"000" };
let currentUser = "";
let cloudData = { ledger: [], payables: [] };
let tempPhotoBase64 = ""; // 暫存照片字串
const $ = id => document.getElementById(id);

function checkLogin() {
  const user = $("loginUser").value;
  const pass = $("loginPass").value;
  if(PASSWORDS[user] === pass) {
    currentUser = user;
    $("loginOverlay").style.display = "none";
    $("mainWrap").style.display = "block";
    $("currentUserLabel").textContent = currentUser;
    $("date").value = new Date().toISOString().slice(0,10);
    fetchCloudData();
  } else {
    alert("密碼錯誤！請重新輸入。");
  }
}

function logout() {
  currentUser = ""; $("loginPass").value = "";
  $("loginOverlay").style.display = "flex"; $("mainWrap").style.display = "none";
}

function switchTab(pageId, btn) {
  document.querySelectorAll('.system-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  $(pageId).classList.add('active'); btn.classList.add('active');
}

async function fetchCloudData() {
  if(!GOOGLE_SCRIPT_URL) return;
  $("loading").style.display = "block";
  try {
    const res = await fetch(GOOGLE_SCRIPT_URL);
    cloudData = await res.json(); renderAll();
  } catch(err) { console.error("雲端同步失敗", err); }
  finally { $("loading").style.display = "none"; }
}

// 👁️ 智慧圖片與備註解析輔助函式
function renderNoteContent(noteText) {
  if (!noteText) return '無備註';
  
  // 判斷是否為單純的照片編碼
  if (noteText.trim().startsWith("data:image")) {
    return `<img src="${noteText.trim()}" class="receipt-preview" alt="收據照片" onclick="window.open(this.src)">`;
  }
  
  // 判斷是否為「備註 + 照片」的複合式結構
  if (noteText.includes("||data:image")) {
    const parts = noteText.split("||data:image");
    const txt = parts[0] || "無備註說明";
    const imgData = "data:image" + parts[1];
    return `<div>${escapeHtml(txt)}</div><img src="${imgData.trim()}" class="receipt-preview" alt="收據照片" onclick="window.open(this.src)">`;
  }
  
  return escapeHtml(noteText);
}

// 📸 照片壓縮與讀取邏輯
function handlePhotoUpload(input) {
  const file = input.files[0];
  if (!file) return;
  
  $("uploadStatus").style.display = "block";
  $("uploadStatus").style.color = "var(--ink-soft)";
  $("uploadStatus").textContent = "⏳ 正在最佳化圖片尺寸...";

  const reader = new FileReader();
  reader.onload = function (e) {
    const img = new Image();
    img.onload = function () {
      // 為了不讓 Google 試算表爆掉，自動將照片等比例壓縮到寬度最大 600px
      const canvas = document.createElement("canvas");
      let width = img.width;
      let height = img.height;
      if (width > 600) { height *= 600 / width; width = 600; }
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      
      tempPhotoBase64 = canvas.toDataURL("image/jpeg", 0.7); // 壓縮品質 0.7
      $("uploadStatus").style.color = "var(--green)";
      $("uploadStatus").textContent = `✓ 收據照片準備完畢 (${file.name})`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderAll() {
  // 1. 日常開銷
  let ledgerHtml = "";
  cloudData.ledger.sort((a,b)=> b.id.localeCompare(a.id)).forEach(e => {
    ledgerHtml += `
      <div class="entry">
        <span class="user-tag" style="background:#6b5d4f;">填表人: ${escapeHtml(e.user)}</span>
        <div class="meta" style="margin-left:10px">
          <div class="cat">${escapeHtml(e.category)} <span style="font-size:11px;color:var(--ink-soft)">(${e.date})</span></div>
          <div class="sub">${renderNoteContent(e.note)}</div>
        </div>
        <div class="amt">${Math.round(e.amount).toLocaleString()}</div>
      </div>
    `;
  });
  $("ledgerList").innerHTML = ledgerHtml || '<div class="empty">暫無日常消費明細</div>';

  // 2. 對帳借貸
  let sumUnpaid = 0, sumPaid = 0;
  let unpaidHtml = "", paidHtml = "";
  
  cloudData.payables.sort((a,b)=> b.id.localeCompare(a.id)).forEach(e => {
    if (e.user !== currentUser && e.who !== currentUser) return; 

    let cardStatusText = "";
    let btnText = "";
    
    if(e.isPaid) {
      cardStatusText = `<span style="color:var(--green); font-size:12px; font-weight:bold;">✨ OK 已付清 (核銷人: ${escapeHtml(e.who)})</span>`;
      btnText = "重設為未付 ↩";
    } else {
      cardStatusText = `<span style="color:var(--accent); font-size:12px; font-weight:bold;">⏳ 待付中</span>`;
      btnText = `確認收到 ✔`;
    }

    const html = `
      <div class="entry payable-card paid-${e.isPaid}">
        <div class="info" style="flex:1">
          <div style="font-weight:bold; color:var(--ink); margin-bottom:4px;">
            【${escapeHtml(e.user)}】 ➔ 應付給 【${escapeHtml(e.who)}】
          </div>
          <div style="font-size:13px; color:var(--ink-soft); margin-bottom:6px;">${escapeHtml(e.note || '無用途備註')}</div>
          <div>${cardStatusText}</div>
        </div>
        <div class="amt" style="margin-right:12px; font-family:'Fraunces'; font-weight:600; font-size:18px;">$${Math.round(e.amount).toLocaleString()}</div>
        <button class="btn-status" onclick="togglePayableStatus('${e.id}')">${btnText}</button>
        <button class="btn-del" onclick="deleteCloudItem('payables', '${e.id}')">✕</button>
      </div>
    `;
    
    if(e.isPaid) {
      sumPaid += e.amount; paidHtml += html;
    } else {
      sumUnpaid += e.amount; unpaidHtml += html;
    }
  });
  
  $("sumUnpaid").textContent = sumUnpaid.toLocaleString();
  $("sumPaid").textContent = sumPaid.toLocaleString();
  $("unpaidList").innerHTML = unpaidHtml || '<div class="empty">🎉 目前沒有與你相關的未付款項。</div>';
  $("paidList").innerHTML = paidHtml || '<div class="empty">暫無歷史紀錄</div>';
}

$("addLedgerBtn").onclick = async () => {
  const amount = parseFloat($("amount").value); if(!amount || amount <= 0) return;
  
  // 整合文字備註與照片資料
  let finalNote = $("note").value.trim();
  if (tempPhotoBase64) {
    finalNote = finalNote ? `${finalNote}||${tempPhotoBase64}` : tempPhotoBase64;
  }

  const payload = { type: "ledger", id: "L-"+Date.now(), user: currentUser, amount: amount, category: $("category").value, date: $("date").value, note: finalNote };
  cloudData.ledger.unshift(payload); renderAll();
  
  // 清空輸入欄位與照片暫存
  $("amount").value = ""; $("note").value = ""; $("photoFile").value = "";
  tempPhotoBase64 = ""; $("uploadStatus").style.display = "none";

  await sendToGas(payload); fetchCloudData();
};

$("addPayableBtn").onclick = async () => {
  const who = $("pWho").value;
  const amount = parseFloat($("pAmount").value);
  if(who === currentUser) { alert("不能登記欠自己錢喔！"); return; }
  if(!amount || amount <= 0) return;
  
  const payload = { type: "payables", id: "P-"+Date.now(), user: currentUser, who: who, amount: amount, dueDate: "", note: $("pNote").value.trim(), isPaid: false };
  cloudData.payables.unshift(payload); renderAll();
  $("pAmount").value = ""; $("pNote").value = "";
  await sendToGas(payload); fetchCloudData();
};

async function togglePayableStatus(id) {
  const payload = { action: "togglePaid", id: id };
  cloudData.payables = cloudData.payables.map(e => { if(e.id === id) e.isPaid = !e.isPaid; return e; });
  renderAll(); await sendToGas(payload); fetchCloudData();
}

async function deleteCloudItem(type, id) {
  if(!confirm("確定要刪除嗎？")) return;
  const payload = { action: "delete", type: type, id: id };
  if(type === 'ledger') cloudData.ledger = cloudData.ledger.filter(e => e.id !== id);
  else cloudData.payables = cloudData.payables.filter(e => e.id !== id);
  renderAll(); await sendToGas(payload); fetchCloudData();
}

async function sendToGas(payload) {
  try { await fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }); } catch(err) {}
}
function escapeHtml(s){ return s ? s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])) : ""; }
</script>
</body>
</html>
